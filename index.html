<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Puffers - Fluffy Friends</title>

<style>
body {
    font-family: Comic Sans MS;
    margin: 0;
    background: #fff;
}

.hero {
    background: linear-gradient(to right, pink, hotpink);
    color: white;
    text-align: center;
    padding: 80px 20px;
}

.hero h1 {
    font-size: 50px;
    margin: 0;
}

.hero p {
    font-size: 20px;
}

.cta {
    background: white;
    color: hotpink;
    border: none;
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 30px;
    cursor: pointer;
    margin-top: 20px;
}

.productos {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 40px;
}

.producto {
    background: #fffafc;
    margin: 20px;
    padding: 20px;
    border-radius: 20px;
    width: 220px;
    text-align: center;
    transition: 0.3s;
}

.producto:hover {
    transform: scale(1.05);
}

button {
    background: hotpink;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 20px;
    cursor: pointer;
}

.badge {
    background: red;
    color: white;
    padding: 5px 10px;
    border-radius: 10px;
    font-size: 12px;
}

.testimonios {
    background: #ffe4ec;
    padding: 40px;
    text-align: center;
}

footer {
    background: black;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<section class="hero">
    <h1>Puffers 🧸</h1>
    <p>Los peluches más suaves de internet 💕</p>
    <button class="cta">Comprar ahora</button>
</section>

<section class="productos">

<div class="producto">
    <span class="badge">🔥 Bestseller</span>
    <h3>Oso Puffy</h3>
    <p>$200 MXN</p>
    <button onclick="comprar('Oso Puffy')">Comprar</button>
</div>

<div class="producto">
    <span class="badge">⚡ Últimas piezas</span>
    <h3>Conejo Soft</h3>
    <p>$180 MXN</p>
    <button onclick="comprar('Conejo Soft')">Comprar</button>
</div>

<div class="producto">
    <h3>Gatito Fluffy</h3>
    <p>$190 MXN</p>
    <button onclick="comprar('Gatito Fluffy')">Comprar</button>
</div>

</section>

<section class="testimonios">
    <h2>💬 Lo que dicen nuestros clientes</h2>
    <p>"El peluche más suave que he comprado 😭💕"</p>
    <p>"Perfecto para regalo, 10/10"</p>
</section>

<footer>
    <p>© Puffers 2026</p>
</footer>

<script>
function comprar(producto){
    alert("Agregando " + producto + " 🛒");
    window.location.href = "https://buy.stripe.com";
}
</script>

</body>
</html>
